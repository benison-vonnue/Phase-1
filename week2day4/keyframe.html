<!-- ‚ÄãTask 4 (50 min) - CSS Keyframe Animations‚Äã
‚Äã249.‚Äã Create a CSS spinner loading animation using @keyframes rotate and animation: rotate 1s‚Äã
‚Äãlinear infinite‚Äã
‚Äã250.‚Äã ‚ÄãCreate a skeleton loading animation: a shimmer effect using a moving linear-gradient‚Äã
‚Äãbackground and animation-direction: alternate‚Äã
‚Äã251.‚Äã ‚ÄãCreate a card entry animation: the card slides up 20px and fades in when it gains the‚Äã
‚Äãclass=visible (add the class manually in DevTools to test)‚Äã
‚Äã252.‚Äã ‚ÄãCreate a notification bell shake animation triggered by :hover‚Äã
‚Äã253.‚Äã Wrap ALL animations in @media (prefers-reduced-motion: no-preference) - they must be‚Äã
‚Äãcompletely off by default‚Äã -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Keyframe Animations</title>
    <style>
      .spinner {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border-top: 5px red solid;
        border-left: 5px red solid;
        animation: spin 1s infinite ease-in;
      }

      .skeleton {
        display: inline-block;
        width: 400px;
        height: 300px;
        border-radius: 50px;
        position: relative;
        overflow: hidden;
        background-color: #dddbdd;
      }
      .skeleton::after {
        z-index: 100;
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        transform: translateX(-100%);
        background-image: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0,
          rgba(255, 255, 255, 0.2) 20%,
          rgba(255, 255, 255, 0.5) 60%,
          rgba(255, 255, 255, 0)
        );
        animation: shimmer 3s infinite;
        content: "";
      }

      .card-property {
        width: 400px;
        height: 300px;
        border-radius: 50px;
        background-color: black;
      }
      .visible {
        animation: fadeup 400ms ease-in 1;
      }

      .bell {
        font-size: 10em;
        display: inline-block;
      }
      .bell:hover {
        animation: ring 0.2s infinite linear;
      }
      @media (prefers-reduced-motion: no-preference) {
        @keyframes spin {
          0% {
            transform: rotate(0deg);
          }
          50% {
            transform: rotate(180deg);
          }
          100% {
            transform: rotate(360deg);
          }
        }
        @keyframes shimmer {
          100% {
            transform: translateX(100%);
          }
        }
        @keyframes fadeup {
          0% {
            transform: translateY(20px);
            opacity: 0;
          }
        }
        @keyframes ring {
          0% {
            transform: rotate(-10deg);
          }
          50% {
            transform: rotate(10deg);
          }
          100% {
            transform: rotate(-10deg);
          }
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h2>CSS Spinner</h2>
        <div>
          <div class="spinner"></div>
        </div>
      </section>
      <section>
        <h2>Skeleton Animation</h2>
        <div class="skeleton"></div>
      </section>
      <section>
        <h2>Card Animation</h2>
        <div class="card-property"></div>
      </section>
      <section>
        <h2>Notification Bell</h2>
        <div class="bell">&#128365;</div>
      </section>
    </main>
  </body>
</html>
