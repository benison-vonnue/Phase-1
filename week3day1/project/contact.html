        <main class="section">
            <h1 class="text-center">Contact Us</h1>
            <section class="contact-form">
                <form action="/" method="get">
                    <fieldset>
                        <label for="name-input">Name</label>

                        <input
                            type="text"
                            id="name-input"
                            name="name-input"
                            aria-label="name-input"
                            placeholder="Name"
                            required
                        />

                        <label for="email-input">Email</label>

                        <input
                            type="email"
                            name="email-input"
                            id="email-input"
                            aria-label="email-input"
                            placeholder="Email"
                            required
                        />

                        <label for="phone-input">Phone</label>

                        <input
                            type="tel"
                            name="phone-input"
                            id="phone-input"
                            aria-label="phone-input"
                            placeholder="Phone"
                            required
                        />
                        <label for="departament-input">Departament</label>
                        <input
                            type="text"
                            name="departament-input"
                            id="departament-input"
                            list="departaments"
                            aria-label="departament-input"
                            placeholder="Departament"
                            required
                        />
                        <datalist id="departaments">
                            <option value="Engineering Dept."></option>
                            <option value="Operations Dept."></option>
                        </datalist>
                        <label for="message-area">Message</label>
                        <textarea
                            name="message-area"
                            id="message-area"
                            aria-label="message-area"
                            placeholder="Message"
                            required
                        ></textarea>
                        <div class="subscribe-container">
                            <span>
                                <input
                                    type="checkbox"
                                    name="newsletter-input"
                                    id="newsletter-input"
                                />
                            </span>
                            <label for="newsletter-input"
                                >Subscribe to our newsletter</label
                            >
                        </div>
                        <div class="submit-btn-container">
                            <button type="submit" class="submit-btn">
                                Submit
                            </button>
                        </div>
                    </fieldset>
                </form>
            </section>
            <section class="section">
                <h2 class="text-center">Our Location</h2>
                <div class="map-card">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d125218.54191373527!2d75.81081544999999!3d11.25556685!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba65938563d4747%3A0x32150641ca32ecab!2sKozhikode%2C%20Kerala!5e0!3m2!1sen!2sin!4v1780981241552!5m2!1sen!2sin"
                        width="600"
                        height="450"
                        style="border: 0"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"
                        title="Kozhikode"
                    ></iframe>
                    <address>
                        <p>Calicut, Kerala</p>
                    </address>
                </div>
            </section>
        </main>
