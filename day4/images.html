<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Images - srcset & picture</title>
  </head>
  <body>
    <main>
      <h1>Responsive Images - srcset & picture</h1>
      <div>
        <img
          alt="Image from picsum 1"
          srcset="
            https://picsum.photos/400/?random=1   400w,
            https://picsum.photos/800/?random=1   800w,
            https://picsum.photos/1200/?random=1 1200w
          "
          loading="eager"
          sizes="(max-width: 600px) 100vw, (max-width: 1200px) 50vw, 33vw"
        />
        <img
          alt="Image from picsum 2"
          srcset="
            https://picsum.photos/400/?random=2   400w,
            https://picsum.photos/800/?random=2   800w,
            https://picsum.photos/1200/?random=2 1200w
          "
          loading="lazy"
          sizes="(max-width: 600px) 100vw, (max-width: 1200px) 50vw, 33vw"
        />
        <img
          alt="Image from picsum 3"
          srcset="
            https://picsum.photos/400/?random=3   400w,
            https://picsum.photos/800/?random=3   800w,
            https://picsum.photos/1200/?random=3 1200w
          "
          loading="lazy"
          sizes="(max-width: 600px) 100vw, (max-width: 1200px) 50vw, 33vw"
        />
        <img
          alt="Image from picsum 4"
          srcset="
            https://picsum.photos/400/?random=4   400w,
            https://picsum.photos/800/?random=4   800w,
            https://picsum.photos/1200/?random=4 1200w
          "
          loading="lazy"
          sizes="(max-width: 600px) 100vw, (max-width: 1200px) 50vw, 33vw"
        />
        <img
          alt="Image from picsum 5"
          srcset="
            https://picsum.photos/400/?random=5   400w,
            https://picsum.photos/800/?random=5   800w,
            https://picsum.photos/1200/?random=5 1200w
          "
          loading="lazy"
          sizes="(max-width: 600px) 100vw, (max-width: 1200px) 50vw, 33vw"
        />
        <img
          alt="Image from picsum 6"
          srcset="
            https://picsum.photos/400/?random=6   400w,
            https://picsum.photos/800/?random=6   800w,
            https://picsum.photos/1200/?random=6 1200w
          "
          loading="lazy"
          sizes="(max-width: 600px) 100vw, (max-width: 1200px) 50vw, 33vw"
        />
        <img
          alt="Image from picsum 7"
          srcset="
            https://picsum.photos/400/?random=7   400w,
            https://picsum.photos/800/?random=7   800w,
            https://picsum.photos/1200/?random=7 1200w
          "
          loading="lazy"
          sizes="(max-width: 600px) 100vw, (max-width: 1200px) 50vw, 33vw"
        />
        <img
          alt="Image from picsum 8"
          srcset="
            https://picsum.photos/400/?random=8   400w,
            https://picsum.photos/800/?random=8   800w,
            https://picsum.photos/1200/?random=8 1200w
          "
          loading="lazy"
          sizes="(max-width: 600px) 100vw, (max-width: 1200px) 50vw, 33vw"
        />
        <picture>
          <source
            srcset="https://picsum.photos/id/237/800"
            media="(max-width: 800px)"
          />
          <img src="https://picsum.photos/id/237/1200/600" alt="Pic of Dog" />
        </picture>
      </div>
    </main>
  </body>
</html>
