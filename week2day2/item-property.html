<!-- Task 2 (40 min) - Every Item Property​
​172.​ ​Create a five-item flex row. Set flex-grow: 0 1 2 1 0 and take a screenshot showing how​
​remaining space distributes​
​173.​ ​Show flex-shrink: create a row where total item widths exceed the container. Set different shrink​
​values and explain how each item reduces​
​174.​ ​Show flex-basis: 0, auto, 200px, 33.333% - explain the difference between flex-basis and width​
​175.​ ​Show the order property: reorder items 5,1,3,2,4 using CSS order without changing HTML​
​176.​ Show align-self: override the container's align-items on one specific item​ -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Every Item Property</title>
  </head>
  <style>
    *,
    body {
      margin: 0;
      padding: 0;
    }
    .flex {
      display: flex;
    }
    .card {
      width: 10vw;
      height: 10vw;
      border: red 1px solid;
    }
    .card-0 {
      width: 10vw;
      height: 10vw;
      border: red 1px solid;
    }
    .card-w-30 {
      width: 30vw;
      height: 10vw;
      border: red 1px solid;
    }
    .border-blue {
      border: blue 1px solid;
    }
    .mb-1 {
      margin-bottom: 1em;
    }
    .w-100 {
      width: 100vw;
    }
    .h-50 {
      height: 50vh;
    }
    .p-1 {
      padding: 1em;
    }
    .gap-1 {
      gap: 1em;
    }
    .center {
      justify-content: center;
      align-items: center;
    }
    .items-center {
      align-items: center;
    }
    .item-end {
      align-self: flex-end;
    }
  </style>
  <body>
    <main>
      <section class="p-1">
        <h2 class="mb-1">Flex Grow</h2>
        <div class="flex p-1 gap-1 border-blue mb-1">
          <div class="card" style="flex-grow: 0"></div>
          <div class="card" style="flex-grow: 1"></div>
          <div class="card" style="flex-grow: 2"></div>
          <div class="card" style="flex-grow: 1"></div>
          <div class="card" style="flex-grow: 0"></div>
        </div>
      </section>
      <section class="p-1">
        <h2 class="mb-1">Flex Shrink</h2>
        <div class="flex p-1 gap-1 border-blue mb-1">
          <!-- flex-shrink is zero so it will shrink -->
          <div class="card-w-30" style="flex-shrink: 0"></div>
          <div class="card-w-30" style="flex-shrink: 1"></div>
          <!-- flex-shrink is highest so it will shrink most -->
          <div class="card-w-30" style="flex-shrink: 2"></div>
          <div class="card-w-30" style="flex-shrink: 1"></div>
          <div class="card-w-30" style="flex-shrink: 0"></div>
        </div>
      </section>
      <section class="p-1">
        <!-- flex basis overriddes width property inside flex containers, auto take values of given width,  -->
        <h2 class="mb-1">Flex Basis</h2>
        <div class="flex p-1 gap-1 border-blue mb-1">
          <div class="card-0" style="flex-basis: 0"></div>
          <div class="card-0" style="flex-basis: auto"></div>

          <div class="card-0" style="flex-basis: 200px"></div>
          <div class="card-0" style="flex-basis: 33.33%"></div>
        </div>
      </section>
      <section class="p-1">
        <h2 class="mb-1">Order</h2>
        <div class="flex p-1 gap-1 border-blue mb-1">
          <div class="card flex center" style="order: 2">1</div>
          <div class="card flex center" style="order: 4">2</div>
          <div class="card flex center" style="order: 3">3</div>
          <div class="card flex center" style="order: 5">4</div>
          <div class="card flex center" style="order: 1">5</div>
        </div>
      </section>
      <section class="p-1">
        <h2 class="mb-1">Flex Align Self</h2>
        <div class="flex p-1 gap-1 border-blue mb-1 h-50 items-center">
          <div class="card flex center">1</div>
          <div class="card flex center">2</div>
          <div class="card flex center item-end">3</div>
          <div class="card flex center">4</div>
          <div class="card flex center">5</div>
        </div>
      </section>
    </main>
  </body>
</html>
