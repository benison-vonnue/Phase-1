<!-- ‚ÄãTask 5 (40 min) - Holy Grail Layout‚Äã
‚Äã184.‚Äã‚ÄãBuild the classic Holy Grail: full-width header, three-column middle (fixed-width left sidebar,‚Äã
‚Äãflexible main content, fixed-width right aside), full-width footer - using only Flexbox, no Grid‚Äã
‚Äã185.‚Äã ‚ÄãMain content must grow to fill all remaining space. Sidebars must have fixed width.‚Äã
‚Äã186.‚Äã ‚ÄãBelow 600px: stack all three columns with main content first (use order property)‚Äã
‚Äã187.‚ÄãAdd min-height: 100vh on the outer wrapper so the footer is always pushed to the bottom‚Äã -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holy Grail Layout</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
      *,
      body {
        padding: 0;
        margin: 0;
        font-family: "Poppins";
      }
      .min-h-100 {
        min-height: 100vh;
      }
      .w-100 {
        width: 100%;
      }
      .flex {
        display: flex;
      }
      .w-20 {
        width: calc(100vw * 0.2);
      }
      .text-center {
        text-align: center;
      }
      .mt-3 {
        margin-top: 3em;
      }
      .mb-3 {
        margin-bottom: 3em;
      }
      .flex-col {
        flex-direction: column;
      }
      @media (max-width: 600px) {
        .w-20 {
          width: 100%;
        }
        .content {
          flex-direction: column;
        }
        .child-1 {
          order: 2;
        }
        .child-2 {
          order: 1;
        }
        .child-3 {
          order: 3;
        }
      }
    </style>
  </head>
  <body class="text-center">
    <main class="min-h-100 flex flex-col">
      <div class="flex mt-3">
        <header class="w-100">Header</header>
      </div>
      <div class="flex content" style="flex-grow: 1">
        <div class="w-20 child-1 mt-3">fixed-width left sidebar</div>
        <div class="child-2 mt-3" style="flex-grow: 1">
          flexible main content
        </div>
        <div class="w-20 child-3 mt-3">fixed-width right aside</div>
      </div>
      <div>
        <footer class="w-100 mt-3 mb-3">Footer</footer>
      </div>
    </main>
  </body>
</html>
