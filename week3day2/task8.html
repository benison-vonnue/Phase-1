<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Image Lightbox</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

            *,
            *::after,
            *::before {
                padding: 0;
                margin: 0;
                box-sizing: border-box;
            }

            html {
                scrollbar-width: none;
            }

            body {
                font-family: "Poppins";
            }

            header {
                margin: 20px 60px;
            }
            main {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 40px;
                margin: 20px 60px;
            }
            .img-card {
                width: 100%;
                aspect-ratio: 1/1;
                border-radius: 50px;
                position: relative;
                overflow: hidden;
            }

            .img-card:focus-visible {
                border: 2px solid black;
            }

            .img-card img {
                position: absolute;
                inset: 0;
                object-fit: contain;
                height: 100%;
                width: 100%;
            }
            .overlay {
                position: fixed;
                height: 100vh;
                width: 100vw;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 9999;
                padding: 60px;
                place-content: center;
                backdrop-filter: blur(10px);
                display: none;
            }
            .overlay img {
                object-fit: contain;
                width: 100%;
                border-radius: 50px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Image Gallery</h1>
        </header>
        <main>
            <div class="img-card" tabindex="-1">
                <img src="https://picsum.photos/id/107/800" alt="" />
            </div>
            <div class="img-card" tabindex="-1">
                <img src="https://picsum.photos/id/108/800" alt="" />
            </div>
            <div class="img-card" tabindex="-1">
                <img src="https://picsum.photos/id/109/800" alt="" />
            </div>
            <div class="img-card" tabindex="-1">
                <img src="https://picsum.photos/id/110/800" alt="" />
            </div>
            <div class="img-card" tabindex="-1">
                <img src="https://picsum.photos/id/111/800" alt="" />
            </div>
            <div class="img-card" tabindex="-1">
                <img src="https://picsum.photos/id/112/800" alt="" />
            </div>
        </main>
        <div class="overlay">
            <img src="https://picsum.photos/id/107/1920/1080" alt="" />
        </div>
        <script src="gallery.js"></script>
    </body>
</html>
