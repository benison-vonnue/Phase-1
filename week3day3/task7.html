<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Drag-and-Drop Kanban Board</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
            *,
            *::after,
            *::before {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Poppins";
                height: 100vh;
            }

            button {
                border: none;
                background-color: transparent;
                cursor: pointer;
            }

            main {
                width: 70vw;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                height: 100%;
                margin-left: auto;
                margin-right: auto;
            }

            main > section {
                overflow: hidden;
            }

            #to-do {
                border-right: 2px solid black;
                border-left: 2px solid black;
            }

            #progress {
                border-right: 2px solid black;
            }
            #done {
                border-right: 2px solid black;
            }

            main > section > h2 {
                text-align: center;
                padding-top: 20px;
                padding-bottom: 10px;
                border-bottom: 2px solid black;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
            }

            main > section > h2 > button {
                display: flex;
                align-items: center;
                position: absolute;
                right: 15px;
                border: none;
                background-color: transparent;
                cursor: pointer;
            }

            main > section > div {
                display: flex;
                flex-direction: column;

                height: 100%;
                padding: 10px;
                position: relative;
            }

            main > section > div > .card-container {
                display: flex;
                flex-direction: column;
                gap: 8px;
                height: 100%;
            }

            .card {
                width: 100%;
                align-items: center;
                min-height: 30px;
                border: 1px solid black;
                border-radius: 5px;
                padding: 0 4px;
            }

            .card:focus {
                border: 2px solid black;
            }

            .form {
                position: absolute;
                min-height: 50px;
                bottom: 100px;
                left: 0;
                width: 100%;
                padding: 8px 4px;
                display: none;
                justify-content: space-between;
                gap: 4px;
            }

            .form > input {
                border: none;
                background-color: transparent;
                width: 100%;
            }

            #to-do .card,
            #to-do .form {
                background-color: lightgoldenrodyellow;
            }

            #progress .card,
            #progress .form {
                background-color: lightblue;
            }

            #done .card,
            #done .form {
                background-color: lightgreen;
            }
        </style>
    </head>
    <body>
        <main>
            <section id="to-do">
                <h2>
                    To Do
                    <button>
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            fill="currentColor"
                            class="bi bi-plus-square"
                            viewBox="0 0 16 16"
                        >
                            <path
                                d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"
                            />
                            <path
                                d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"
                            />
                        </svg>
                    </button>
                </h2>
                <div>
                    <div class="card-container" id="to-do-container"></div>
                    <div class="form">
                        <input
                            type="text"
                            name="to-do-input"
                            id="to-do-input"
                        />
                        <button>
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                fill="currentColor"
                                class="bi bi-check-circle"
                                viewBox="0 0 16 16"
                            >
                                <path
                                    d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"
                                />
                                <path
                                    d="m10.97 4.97-.02.022-3.473 4.425-2.093-2.094a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05"
                                />
                            </svg>
                        </button>
                    </div>
                </div>
            </section>
            <section id="progress">
                <h2>
                    In Progress
                    <button>
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            fill="currentColor"
                            class="bi bi-plus-square"
                            viewBox="0 0 16 16"
                        >
                            <path
                                d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"
                            />
                            <path
                                d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"
                            />
                        </svg>
                    </button>
                </h2>
                <div>
                    <div class="card-container" id="progress-container"></div>
                    <div class="form">
                        <input
                            type="text"
                            name="progress-input"
                            id="progress-input"
                        />
                        <button>
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                fill="currentColor"
                                class="bi bi-check-circle"
                                viewBox="0 0 16 16"
                            >
                                <path
                                    d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"
                                />
                                <path
                                    d="m10.97 4.97-.02.022-3.473 4.425-2.093-2.094a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05"
                                />
                            </svg>
                        </button>
                    </div>
                </div>
            </section>
            <section id="done">
                <h2>
                    Done
                    <button>
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            fill="currentColor"
                            class="bi bi-plus-square"
                            viewBox="0 0 16 16"
                        >
                            <path
                                d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"
                            />
                            <path
                                d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"
                            />
                        </svg>
                    </button>
                </h2>
                <div>
                    <div class="card-container" id="done-container"></div>
                    <div class="form">
                        <input type="text" name="done-input" id="done-input" />
                        <button>
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                fill="currentColor"
                                class="bi bi-check-circle"
                                viewBox="0 0 16 16"
                            >
                                <path
                                    d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"
                                />
                                <path
                                    d="m10.97 4.97-.02.022-3.473 4.425-2.093-2.094a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05"
                                />
                            </svg>
                        </button>
                    </div>
                </div>
            </section>
        </main>
        <script src="drag.js"></script>
    </body>
</html>
